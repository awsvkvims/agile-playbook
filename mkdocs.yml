site_name: Agile Transformation Playbook
site_description: Operating model, coaching structures, metrics, governance, and transformation artifacts
site_author: Your Organization
repo_url: https://github.com/awsvkvims/agile-playbook
repo_name: agile-playbook

theme:
  name: material
  features:
    - navigation.footer
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - search.highlight

nav:
  - Home: index.md
  - Executive Summary: EXECUTIVE_TRANSFORMATION_SUMMARY.md
  - Playbook Overview: playbook/PLAYBOOK.md

  - Transformation:
      - Transformation Principles: transformation/TRANSFORMATION_PRINCIPLES.md
      - Leadership Playbook: transformation/LEADERSHIP_PLAYBOOK.md
      - Transformation Lifecycle: transformation/TRANSFORMATION_LIFECYCLE.md
      - Transformation Roles: transformation/TRANSFORMATION_ROLES.md
      - Transformation Organizational Topologies: transformation/TRANSFORMATION_ORGANIZATIONAL_TOPOLOGIES.md
      - Transformation Anti-Patterns: transformation/TRANSFORMATION_ANTI_PATTERNS.md
      - Roadmap Template: transformation/TRANSFORMATION_ROADMAP_TEMPLATE.md
      - Maturity Model: transformation/AGILE_MATURITY_MODEL.md
      - Maturity Scoring Worksheet: transformation/MATURITY_SCORING_WORKSHEET.md
      - Quarterly Executive Review: transformation/QUARTERLY_EXECUTIVE_REVIEW_TEMPLATE.md

  - Culture:
      - Common Cultural Barriers: culture/COMMON_CULTURAL_BARRIERS.md

  - Coaching:
      - Agile Coaching Structures: coaching/AGILE_COACHING_STRUCTURES.md
      - Coaching Agreement Template: templates/COACHING_AGREEMENT_TEMPLATE.md
      
  - Capability Development:
      - Continuous Learning Forums: capability/CONTINUOUS_LEARNING.md
      - Kaizen Culture: capability/KAIZEN_CULTURE.md
      - XP Engineering Practices: capability/XP_ENGINEERING_PRACTICES.md
      - DevOps Coaching Model: capability/DEVOPS_COACHING_MODEL.md
      - Dojo Model: capability/DOJO_MODEL.md

  - Delivery and Flow:
      - Metrics Framework: metrics/METRICS_FRAMEWORK.md
      - Transformation Health Dashboard: metrics/TRANSFORMATION_HEALTH_DASHBOARD.md
      - Value Stream Flow: diagrams/swimlanes/VALUE_STREAM_FLOW.md
      - Framework iValue Stream Comparison: diagrams/FRAMEWORK_VALUE_STREAM_COMPARISON.md
      - Unified Value Stream Overlay: diagrams/UNIFIED_VALUE_STREAM_OVERLAY.md

  - Governance:
      - Agile Operating Model RACI: raci/AGILE_OPERATING_MODEL_RACI.md
      - Coaching Escalation Flow: diagrams/swimlanes/COACHING_ESCALATION_FLOW.md

  - Templates:
      - Retrospective Template: templates/RETROSPECTIVE_TEMPLATE.md
      - Working Agreement Template: templates/WORKING_AGREEMENT_TEMPLATE.md
      - Coaching Agreement Template: templates/COACHING_AGREEMENT_TEMPLATE.md

  - Artifacts:
      - Transformation Health Report: artifacts/TRANSFORMATION_HEALTH_REPORT_TEMPLATE.md
      - Maturity Assessment Report: artifacts/MATURITY_ASSESSMENT_REPORT_TEMPLATE.md
      - Transformation Backlog: artifacts/TRANSFORMATION_BACKLOG_TEMPLATE.md

  - Reference:
      - Glossary: glossary/GLOSSARY.md

  - Site:
      - Site Instructions: SITE.md
      - Style Guide: STYLE_GUIDE.md
     
      
markdown_extensions:
  - toc:
      permalink: true
  - tables
  - fenced_code
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
          
extra_javascript:
  - https://unpkg.com/mermaid@10.9.1/dist/mermaid.min.js
  - js/mermaid-init.js

extra_css:
  - css/extra.css  
